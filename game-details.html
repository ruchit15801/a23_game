    <style>
        .details-container {
            max-width: 600px;
            margin: 2rem auto;
        }

        .details-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .hero-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: var(--radius-md);
            object-fit: cover;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
        }

        .game-title {
            font-size: 2.25rem;
            font-weight: 900;
            margin-bottom: 1rem;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .play-btn-large {
            background: var(--primary);
            color: #fff;
            padding: 1rem 3.5rem;
            border-radius: var(--radius-full);
            font-size: 1.25rem;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            transition: var(--transition);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            border: none;
            cursor: pointer;
        }

        .play-btn-large:hover {
            transform: translateY(-4px);
            background: var(--primary-hover);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .back-link {
            display: block;
            margin-top: 2rem;
            text-align: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--primary);
        }

        .description-box {
            margin-top: 3rem;
            text-align: left;
            border-top: 1px solid var(--border);
            padding-top: 2rem;
        }

        .description-box h3 {
            margin-bottom: 1rem;
            color: var(--text-main);
            font-weight: 800;
            font-size: 1.25rem;
        }

        .description-box p {
            color: var(--text-muted);
            line-height: 1.7;
        }

        .loader {
            padding: 3rem 0;
            color: var(--primary);
            font-weight: 700;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>

<body>
    <div id="app-wrapper">
        <header>
            <div class="container header-content">
                <a href="/index.html" class="logo">
                    <img src="/assets/logo.png" class="logo-icon-img" alt="A23 Logo">
                    <h1>A23<span>GAMES</span></h1>
                </a>
                <div class="user-info">
                    <div class="coin-balance">
                        <span class="coin-icon">🪙</span>
                        <span id="balance-amount">5</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="container">
            <div class="details-container">
                <div class="details-card" id="details-content">
                    <div class="loader">Loading game details...</div>
                </div>
                <a href="/index.html" class="back-link">← Back to Gallery</a>
            </div>
        </main>

        <footer>
            <div class="container footer-content">
                <a href="/index.html" class="footer-logo">
                    <img src="/assets/logo.png" alt="A23 Logo">
                    <h2>A23<span>GAMES</span></h2>
                </a>
                <div class="footer-links">
                    <a href="/about.html">About Us</a>
                    <a href="/contact.html">Contact Us</a>
                    <a href="/privacy.html">Privacy Policy</a>
                    <a href="/terms.html">Terms & Conditions</a>
                </div>
                <p class="footer-copyright">&copy; 2026 A23Games. Play Premium HTML5 Games for Free.</p>
            </div>
        </footer>
    </div>
    <script src="/js/games.js"></script>
    <script src="/js/details.js"></script>
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>

</html>
