<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" id="meta-desc" content="Play high-quality online games on A23Games. No downloads required.">
    <link rel="canonical" id="canonical-url" href="https://a23game.in/game-details.html">
    
    <!-- PWA & Icons -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#38bdf8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/icon-512.png">

    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B0TNF7TQW3"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-B0TNF7TQW3');

    <!-- Content Protection -->
    <script src="js/security.js"></script>

    <!-- Social Media (Open Graph) -->
    <meta property="og:title" id="og-title" content="Game Details | A23Games">
    <meta property="og:description" id="og-desc" content="Play instant high-quality games on A23Games.">
    <meta property="og:image" id="og-image" content="https://a23game.in/assets/img/og-image.png">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .details-container {
            max-width: 600px;
            margin: 2rem auto;
            text-align: center;
        }

        .details-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }

        .hero-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .play-btn-large {
            background: #e11d48;
            /* Reddish-pink like reference */
            color: #fff;
            padding: 1.2rem 4rem;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(225, 29, 72, 0.3);
            border: none;
            cursor: pointer;
        }

        .play-btn-large:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(225, 29, 72, 0.5);
            background: #f43f5e;
        }

        .back-link {
            display: block;
            margin-top: 2rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1rem;
        }

        .back-link:hover {
            color: #fff;
        }

        .description-box {
            margin-top: 3rem;
            text-align: left;
            border-top: 1px solid var(--glass-border);
            padding-top: 2rem;
        }

        .description-box h3 {
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .description-box p {
            color: var(--text-secondary);
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div id="app-wrapper">
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>

        <header>
            <div class="container header-content">
                <div class="logo">
                    <img src="/assets/logo.png" class="logo-icon-img" alt="A23 Logo">
                    <h1>A23<span>GAMES</span></h1>
                </div>
                <div class="user-info">
                    <div class="coin-balance">
                        <span class="coin-icon">🪙</span>
                        <span id="balance-amount">5</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="container">
            <div class="details-container">
                <div class="details-card" id="details-content">
                    <div class="loader">Loading game details...</div>
                </div>
                <a href="/index.html" class="back-link">← Back to Gallery</a>
            </div>
        </main>

        <footer>
            <div class="container footer-content">
                <div class="footer-links">
                    <a href="/privacy.html">Privacy Policy</a>
                    <a href="/terms.html">Terms of Service</a>
                </div>
                <p>&copy; 2026 A23Games. All rights reserved.</p>
            </div>
        </footer>
    </div>
    <script src="/js/games.js"></script>
    <script src="/js/details.js"></script>
    <script>
        // Store game visit in localStorage for Recent Games logic
        const params = new URLSearchParams(window.location.search);
        const gameId = params.get('id');
        if (gameId) {
            let recent = JSON.parse(localStorage.getItem('recent_games') || '[]');
            recent = recent.filter(id => id !== gameId);
            recent.unshift(gameId);
            localStorage.setItem('recent_games', JSON.stringify(recent.slice(0, 8)));
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>

</html>
